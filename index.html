<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎱 弹珠小游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      user-select: none;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #00eaff;
      letter-spacing: 4px;
    }
    #scoreboard {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }
    #scoreboard span { color: #00eaff; font-weight: bold; font-size: 1.3rem; }
    #gameCanvas {
      border: 2px solid #00eaff;
      border-radius: 8px;
      box-shadow: 0 0 30px #00eaff66;
      display: block;
      background: #0d0d2b;
      cursor: none;
    }
    #controls {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
      line-height: 1.8;
    }
    #controls b { color: #fff; }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,26,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .overlay h2 { font-size: 2.5rem; margin-bottom: 10px; }
    .overlay p  { font-size: 1.1rem; color: #ccc; margin-bottom: 8px; }
    .overlay small { font-size: 0.9rem; color: #888; margin-bottom: 24px; display: block; }
    .btn {
      padding: 12px 36px;
      font-size: 1.1rem;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #00eaff, #0055ff);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 0 20px #00eaff88;
      transition: transform .1s;
    }
    .btn:hover { transform: scale(1.06); }
    .btn-yellow {
      background: linear-gradient(135deg, #ffe066, #ff8800);
      color: #000;
      box-shadow: 0 0 20px #ff880088;
    }
  </style>
</head>
<body>
  <h1>🎱 弹珠小游戏</h1>
  <div id="scoreboard">
    <div>得分：<span id="score">0</span></div>
    <div>最高分：<span id="best">0</span></div>
    <div>生命：<span id="lives">3</span></div>
    <div>关卡：<span id="level">1</span></div>
  </div>
  <canvas id="gameCanvas" width="480" height="600"></canvas>
  <div id="controls">
    <b>← →</b> 移动挡板 &nbsp;|&nbsp; <b>鼠标</b> 控制挡板 &nbsp;|&nbsp; <b>空格</b> 发射/暂停
  </div>

  <!-- 开始界面 -->
  <div id="startOverlay" class="overlay">
    <h2 style="color:#00eaff;text-shadow:0 0 20px #00eaff;">🎱 弹珠小游戏</h2>
    <p>击碎所有砖块，不要让球掉落！</p>
    <small>← → 或鼠标移动挡板 &nbsp;|&nbsp; 空格键发射</small>
    <button class="btn" id="startBtn">开始游戏</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // ─── 状态枚举 ─────────────────────────────────────────
    // IDLE: 未开始  READY: 已开始但球贴着挡板  PLAYING: 球在飞  PAUSED: 暂停  OVER: 结束
    const STATE = { IDLE:'idle', READY:'ready', PLAYING:'playing', PAUSED:'paused', OVER:'over' };
    let state = STATE.IDLE;
    let animId = null;

    // ─── 分数 ──────────────────────────────────────────────
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('ballBest') || '0');
    let lives = 3, level = 1;

    // ─── 挡板 ─────────────────────────────────────────────
    const paddle = { w: 90, h: 12, x: 195, y: H - 30, speed: 7 };

    // ─── 球 ───────────────────────────────────────────────
    const ball = { r: 9, x: 0, y: 0, vx: 0, vy: 0, trail: [] };

    function resetBall() {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - ball.r - 1;
      ball.vx = 0;
      ball.vy = 0;
      ball.trail = [];
    }

    function launchBall() {
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
      const spd   = 4 + level * 0.4;
      ball.vx = Math.cos(angle) * spd;
      ball.vy = Math.sin(angle) * spd;
    }

    // ─── 砖块 ─────────────────────────────────────────────
    const COLS = 8, ROWS = 5;
    const BRICK_W = 50, BRICK_H = 18, BRICK_PAD = 6;
    const OFFSET_X = (W - (COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;
    const OFFSET_Y = 55;

    const BRICK_COLORS = [
      '#ff4466', '#ff8800', '#ffee00', '#44ff88', '#00ccff',
    ];

    let bricks = [];
    function initBricks() {
      bricks = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const hp = (level >= 3 && r < 2) ? 2 : 1;
          bricks.push({
            x: OFFSET_X + c * (BRICK_W + BRICK_PAD),
            y: OFFSET_Y + r * (BRICK_H + BRICK_PAD),
            w: BRICK_W, h: BRICK_H,
            hp, maxHp: hp,
            alive: true,
            color: BRICK_COLORS[r % BRICK_COLORS.length],
          });
        }
      }
    }

    // ─── 粒子 ─────────────────────────────────────────────
    let particles = [];
    function spawnParticles(x, y, color) {
      for (let i = 0; i < 10; i++) {
        const a   = Math.random() * Math.PI * 2;
        const spd = 1.5 + Math.random() * 3;
        particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, color });
      }
    }

    // ─── 键盘 ─────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') {
        e.preventDefault();
        handleSpace();
        return;
      }
      keys[e.code] = true;
    });
    document.addEventListener('keyup', e => {
      keys[e.code] = false;
    });

    function handleSpace() {
      if (state === STATE.READY) {
        // 发射球
        launchBall();
        state = STATE.PLAYING;
      } else if (state === STATE.PLAYING) {
        // 暂停
        state = STATE.PAUSED;
      } else if (state === STATE.PAUSED) {
        // 恢复
        state = STATE.PLAYING;
      }
      // IDLE / OVER 状态下空格无效（由按钮控制）
    }

    // ─── 鼠标 ─────────────────────────────────────────────
    let mouseX = -1;
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
    });
    canvas.addEventListener('click', () => {
      if (state === STATE.READY) {
        launchBall();
        state = STATE.PLAYING;
      }
    });

    function applyMouse() {
      if (mouseX < 0) return;
      paddle.x = mouseX - paddle.w / 2;
      clampPaddle();
    }

    function clampPaddle() {
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));
    }

    // ─── HUD ──────────────────────────────────────────────
    function addScore(pts) {
      score += pts;
      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('ballBest', bestScore);
      }
      updateHUD();
    }
    function updateHUD() {
      document.getElementById('score').textContent = score;
      document.getElementById('best').textContent  = bestScore;
      document.getElementById('lives').textContent = lives;
      document.getElementById('level').textContent = level;
    }

    // ─── 碰撞检测 ─────────────────────────────────────────
    function rectBallCollide(rx, ry, rw, rh) {
      const nx = Math.max(rx, Math.min(ball.x, rx + rw));
      const ny = Math.max(ry, Math.min(ball.y, ry + rh));
      const dx = ball.x - nx, dy = ball.y - ny;
      return dx*dx + dy*dy <= ball.r * ball.r;
    }

    function resolveBrick(b) {
      const cx = b.x + b.w / 2, cy = b.y + b.h / 2;
      const ox = (b.w/2 + ball.r) - Math.abs(ball.x - cx);
      const oy = (b.h/2 + ball.r) - Math.abs(ball.y - cy);
      if (ox < oy) ball.vx = -ball.vx;
      else         ball.vy = -ball.vy;
    }

    // ─── Update（只在 READY/PLAYING 时调用）───────────────
    function update() {
      // 挡板控制（READY 和 PLAYING 都可以移动）
      applyMouse();
      if (keys['ArrowLeft'])  { paddle.x -= paddle.speed; clampPaddle(); }
      if (keys['ArrowRight']) { paddle.x += paddle.speed; clampPaddle(); }

      // READY：球贴着挡板跟随移动
      if (state === STATE.READY) {
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - ball.r - 1;
        return;
      }

      // PLAYING：物理更新
      if (state !== STATE.PLAYING) return;

      // 轨迹
      ball.trail.push({ x: ball.x, y: ball.y });
      if (ball.trail.length > 8) ball.trail.shift();

      ball.x += ball.vx;
      ball.y += ball.vy;

      // 墙壁反弹
      if (ball.x - ball.r < 0)  { ball.x = ball.r;     ball.vx =  Math.abs(ball.vx); }
      if (ball.x + ball.r > W)  { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
      if (ball.y - ball.r < 0)  { ball.y = ball.r;     ball.vy =  Math.abs(ball.vy); }

      // 掉出底部
      if (ball.y - ball.r > H) {
        lives--;
        updateHUD();
        if (lives <= 0) {
          doGameOver();
          return;
        }
        resetBall();
        state = STATE.READY;
        return;
      }

      // 挡板碰撞
      if (ball.vy > 0 && rectBallCollide(paddle.x, paddle.y, paddle.w, paddle.h)) {
        ball.y = paddle.y - ball.r;
        const hit   = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
        const angle = hit * (Math.PI / 3);
        const spd   = Math.hypot(ball.vx, ball.vy);
        ball.vx = Math.sin(angle) * spd;
        ball.vy = -Math.abs(Math.cos(angle) * spd);
      }

      // 砖块碰撞
      let remaining = 0;
      for (const b of bricks) {
        if (!b.alive) continue;
        remaining++;
        if (rectBallCollide(b.x, b.y, b.w, b.h)) {
          resolveBrick(b);
          b.hp--;
          if (b.hp <= 0) {
            b.alive = false;
            remaining--;
            spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color);
            addScore(10 * level);
          } else {
            addScore(5);
          }
          break;
        }
      }

      if (remaining === 0) {
        doNextLevel();
        return;
      }

      // 粒子
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= 0.03;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // ─── Draw ─────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);

      // 砖块
      for (const b of bricks) {
        if (!b.alive) continue;
        ctx.globalAlpha = (b.hp < b.maxHp) ? 0.5 : 1;
        ctx.fillStyle   = b.color;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, 4);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#ffffff33';
        ctx.lineWidth   = 1;
        ctx.stroke();
        if (b.hp < b.maxHp) {
          ctx.strokeStyle = '#00000077';
          ctx.lineWidth   = 1.5;
          ctx.beginPath();
          ctx.moveTo(b.x + b.w*0.3, b.y + 2);
          ctx.lineTo(b.x + b.w*0.5, b.y + b.h - 2);
          ctx.stroke();
        }
      }

      // 轨迹
      for (let i = 0; i < ball.trail.length; i++) {
        const t = ball.trail[i];
        const a = (i / ball.trail.length) * 0.25;
        ctx.beginPath();
        ctx.arc(t.x, t.y, ball.r * (i / ball.trail.length) * 0.8, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,224,102,${a})`;
        ctx.fill();
      }

      // 球
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
      ctx.fillStyle   = '#ffe066';
      ctx.fill();
      ctx.strokeStyle = '#ffffffaa';
      ctx.lineWidth   = 1;
      ctx.stroke();

      // 挡板
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
      ctx.fillStyle   = '#00eaff';
      ctx.fill();
      ctx.strokeStyle = '#ffffffaa';
      ctx.lineWidth   = 1;
      ctx.stroke();

      // 粒子
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI*2);
        ctx.globalAlpha = p.life;
        ctx.fillStyle   = p.color;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // 提示文字
      if (state === STATE.READY) {
        ctx.fillStyle   = '#ffffffaa';
        ctx.font        = '14px Arial';
        ctx.textAlign   = 'center';
        ctx.fillText('按空格 / 点击发射', W/2, H - 10);
      }

      // 暂停遮罩（直接在画布上绘制，不用 DOM）
      if (state === STATE.PAUSED) {
        ctx.fillStyle = 'rgba(10,10,26,0.72)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle   = '#fff';
        ctx.font        = 'bold 36px Arial';
        ctx.textAlign   = 'center';
        ctx.fillText('⏸ 已暂停', W/2, H/2 - 20);
        ctx.font        = '18px Arial';
        ctx.fillStyle   = '#aaa';
        ctx.fillText('按空格键继续', W/2, H/2 + 20);
      }
    }

    // ─── 游戏循环 ─────────────────────────────────────────
    function loop() {
      update();
      draw();
      animId = requestAnimationFrame(loop);
    }

    function startLoop() {
      if (animId !== null) cancelAnimationFrame(animId);
      animId = requestAnimationFrame(loop);
    }

    function stopLoop() {
      if (animId !== null) {
        cancelAnimationFrame(animId);
        animId = null;
      }
    }

    // ─── 关卡切换（用 overlay 提示，循环继续跑）──────────
    function doNextLevel() {
      // 切换到 READY，循环不停，让挡板仍可控制
      level++;
      paddle.w = Math.max(60, 90 - (level - 1) * 5);
      initBricks();
      resetBall();
      state = STATE.READY;
      updateHUD();
      showOverlay(
        `🎉 第 ${level - 1} 关通过！`,
        `准备进入第 <b style="color:#ffe066">${level}</b> 关`,
        '挡板变窄，球速加快',
        '继续',
        'btn btn-yellow',
        () => { /* overlay 关闭即可，state 已是 READY */ }
      );
    }

    // ─── 游戏结束 ─────────────────────────────────────────
    function doGameOver() {
      state = STATE.OVER;
      updateHUD();
      showOverlay(
        '💥 游戏结束',
        `得分：<b style="color:#ffe066">${score}</b>`,
        `最高分：<b style="color:#00eaff">${bestScore}</b>`,
        '再来一次',
        'btn',
        () => {
          score = 0; lives = 3; level = 1;
          paddle.w = 90;
          particles = [];
          initBricks();
          resetBall();
          updateHUD();
          state = STATE.READY;
        }
      );
    }

    // ─── 通用 Overlay ─────────────────────────────────────
    function showOverlay(title, line1, line2, btnText, btnClass, onConfirm) {
      document.querySelectorAll('.dyn-overlay').forEach(el => el.remove());
      const ov = document.createElement('div');
      ov.className = 'overlay dyn-overlay';
      ov.innerHTML = `
        <h2>${title}</h2>
        <p>${line1}</p>
        <small>${line2}</small>
        <button class="${btnClass}">${btnText}</button>
      `;
      ov.querySelector('button').addEventListener('click', () => {
        ov.remove();
        onConfirm();
      });
      document.body.appendChild(ov);
    }

    // ─── 初始化 ───────────────────────────────────────────
    updateHUD();
    initBricks();
    resetBall();
    draw();

    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('startOverlay').remove();
      score = 0; lives = 3; level = 1;
      paddle.w = 90;
      particles = [];
      initBricks();
      resetBall();
      updateHUD();
      state = STATE.READY;
      startLoop();
    });
  </script>
</body>
</html>
